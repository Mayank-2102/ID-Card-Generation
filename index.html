// CARD TEMPLATES v10
// Exact dimensions: 240px × 389px (ratio 0.617 = standard ID card)
// Logo fix: use Supabase storage .download() — bypasses CORS entirely
// Class + Section → RIGHT side info table
// ════════════════════════════════════════════════

// ── IMAGE LOADING ──────────────────────────────────────────────────
// Logo always blank in PDF = classic html2canvas cross-origin bug.
// Fix: convert EVERY image to base64 data-URI BEFORE html2canvas runs.
// 3-method waterfall, each with Supabase apikey header.

// Method 1: Supabase JS SDK .download() — authenticated, bypasses CORS
async function supabaseDownload(url){
  if(!url) return null;
  try{
    // Match: /storage/v1/object/public/BUCKET/ANY/PATH/FILE.ext(?query)
    const m = url.match(/\/storage\/v1\/object\/(?:public|authenticated)\/([^/?#]+)\/([^?#]+)/);
    if(!m) return null;
    const bucket = m[1];
    const path   = decodeURIComponent(m[2]);
    const {data, error} = await db.storage.from(bucket).download(path);
    if(error || !data){ console.warn('[logo] sdk download error:', error?.message); return null; }
    const b64 = await blobToB64(data);
    console.log('[logo] sdk download OK, bucket='+bucket+' path='+path+' len='+b64?.length);
    return b64;
  } catch(e){ console.warn('[logo] sdk download exception:', e.message); return null; }
}

// Method 2: Direct fetch with Supabase apikey header
async function fetchToB64(url){
  if(!url) return null;
  try{
    const r = await fetch(url, {
      method: 'GET',
      headers: { 'apikey': SKEY, 'Authorization': 'Bearer ' + SKEY },
      cache: 'no-cache',
      mode: 'cors',
      credentials: 'omit'
    });
    if(!r.ok){ console.warn('[logo] fetch failed:', r.status, r.statusText); return null; }
    const b64 = await blobToB64(await r.blob());
    console.log('[logo] fetch OK, len='+b64?.length);
    return b64;
  } catch(e){ console.warn('[logo] fetch exception:', e.message); return null; }
}

// Method 3: Draw <img crossOrigin=anonymous> → canvas → base64
// Works when server sends Access-Control-Allow-Origin: * (Supabase public buckets do)
async function canvasDrawB64(url){
  if(!url) return null;
  return new Promise(res => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    // Cache-bust: forces a fresh CORS request, avoids tainted-canvas from cached no-cors load
    img.src = url + (url.includes('?') ? '&' : '?') + '__cb=' + Date.now();
    img.onload = () => {
      try{
        const cv = document.createElement('canvas');
        cv.width  = img.naturalWidth  || 256;
        cv.height = img.naturalHeight || 256;
        cv.getContext('2d').drawImage(img, 0, 0);
        const b64 = cv.toDataURL('image/png');
        console.log('[logo] canvasDraw OK, len='+b64?.length);
        res(b64);
      } catch(e){ console.warn('[logo] canvasDraw tainted:', e.message); res(null); }
    };
    img.onerror = e => { console.warn('[logo] canvasDraw img error'); res(null); };
  });
}

function blobToB64(blob){
  return new Promise(res => {
    const fr = new FileReader();
    fr.onload  = () => res(fr.result);
    fr.onerror = () => { console.warn('[logo] FileReader error'); res(null); };
    fr.readAsDataURL(blob);
  });
}

// Master: try all 3 methods in order
async function imgToB64(url){
  if(!url) return null;
  console.log('[imgToB64] loading:', url.slice(-60));
  const b = await supabaseDownload(url); if(b) return b;
  const f = await fetchToB64(url);       if(f) return f;
  const d = await canvasDrawB64(url);
  if(!d) console.error('[imgToB64] ALL METHODS FAILED for:', url.slice(-60));
  return d;
}

// ── CARD HELPERS ──────────────────────────────────────────────────
function logoEl(b64,sz,bw,bc){
  const inner=b64
    ?`<img src="${b64}" style="width:${sz}px;height:${sz}px;display:block;object-fit:contain">`
    :`<div style="width:${sz}px;height:${sz}px;background:rgba(255,255,255,.15);display:table-cell;vertical-align:middle;text-align:center;font-size:${sz*.35|0}px">🏫</div>`;
  return`<div style="width:${sz}px;height:${sz}px;border-radius:50%;border:${bw}px solid ${bc};overflow:hidden;background:#fff;display:inline-block;line-height:0">${inner}</div>`;
}

function sigEl(b64,w,h){
  if(b64)return`<img src="${b64}" style="width:${w}px;height:${h}px;display:block;object-fit:contain;filter:brightness(0) invert(1)">`;
  return`<div style="width:${w}px;height:${h}px;border-bottom:1.5px solid rgba(255,255,255,.65)"></div>`;
}

function photoEl(b64,w,h){
  if(b64)return`<img src="${b64}" style="width:${w}px;height:${h}px;display:block;object-fit:cover">`;
  return`<div style="width:${w}px;height:${h}px;background:#c8cedf;display:table-cell;vertical-align:middle;text-align:center"><span style="font-family:Arial;font-size:8px;font-weight:700;color:#777">PHOTO</span></div>`;
}

// ── CARD BUILDER ──────────────────────────────────────────────────
// Card: exactly 240px wide — PDF scales to mm
// Layout:
//   HEADER : logo (left) | school name+address (centre)
//   STRIPE : accent colour
//   BODY   : LEFT = photo only | RIGHT = name + class + sec + roll + all info
//   STRIPE : accent colour
//   FOOTER : session (left) | sig + principal (right)

function buildCard(st,sc,C,imgs){

  // Row: label : value — nowrap for all except address
  const row=(l,v,wrap)=>v?`<tr>
    <td style="font-family:Arial;font-size:7.5px;font-weight:600;color:#444;padding:2.2px 4px 2.2px 0;vertical-align:top;white-space:nowrap;line-height:1.35">${l}</td>
    <td style="font-family:Arial;font-size:7.5px;font-weight:600;color:#666;padding:2.2px 3px 2.2px 0;vertical-align:top;line-height:1.35">:</td>
    <td style="font-family:Arial;font-size:7.5px;font-weight:700;color:#0d0d0d;padding:2.2px 0;vertical-align:top;line-height:1.35;${wrap?'word-break:break-word;max-width:90px':'white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px'}">${escH(v)}</td>
  </tr>`:'';

  // Photo sized to keep card naturally close to 240×389 ratio
  const PW=76, PH=98, LOGO=48;  // passport ratio 35:45 = 1:1.286 → 76×98px

  return`<table cellspacing="0" cellpadding="0" style="width:240px;border-collapse:collapse;font-family:Arial,sans-serif;border:2px solid ${C.border}">

  <!-- ══ HEADER ══ -->
  <tr><td colspan="2" style="background:${C.hdr};padding:0">
    <table cellspacing="0" cellpadding="0" style="width:100%;border-collapse:collapse"><tr>
      <td style="width:60px;padding:7px 0 7px 7px;vertical-align:middle;text-align:center">
        ${logoEl(imgs.logo,LOGO,2.5,C.accent)}
      </td>
      <td style="padding:7px 8px 7px 4px;vertical-align:middle;text-align:center">
        <div style="font-family:Arial;font-size:11px;font-weight:900;color:${C.hdrText};text-transform:uppercase;letter-spacing:.5px;line-height:1.2">${escH(sc.name||'SCHOOL NAME')}</div>
        ${sc.affiliation?`<div style="font-family:Arial;font-size:6.5px;font-weight:600;color:${C.hdrSub};margin-top:2px">${escH(sc.affiliation)}</div>`:''}
        ${sc.address?`<div style="font-family:Arial;font-size:6.2px;color:${C.hdrSub};margin-top:1.5px;line-height:1.3">${escH(sc.address)}</div>`:''}
        ${sc.phone?`<div style="font-family:Arial;font-size:6.2px;color:${C.hdrSub};margin-top:1px">MOB: ${escH(sc.phone)}</div>`:''}
      </td>
    </tr></table>
  </td></tr>

  <!-- ══ GOLD LINE ══ -->
  <tr><td colspan="2" style="height:3.5px;background:${C.accent};padding:0;font-size:0;line-height:0"></td></tr>

  <!-- ══ BODY ══ -->
  <tr style="background:#fff">

    <!-- LEFT: passport photo + name + roll (tight, no gap) -->
    <td style="width:92px;vertical-align:top;padding:7px 0 6px 7px">
      <!-- Passport-ratio photo: 35×45mm proportion = PW × 1.286 -->
      <div style="border:1.5px solid ${C.accent};line-height:0;display:inline-block">
        ${photoEl(imgs.photo,PW,PH)}
      </div>
      <!-- Name immediately below photo — margin-top:3px only -->
      <div style="width:${PW}px;margin-top:3px;text-align:center;line-height:1.2">
        <span style="font-family:Arial;font-size:7px;font-weight:900;color:${C.hdr};text-transform:uppercase;letter-spacing:.25px;word-break:break-word">${escH(st.name||'')}</span>
      </div>
      <!-- Roll directly below name — margin-top:1px, no gap -->
      ${st.roll?`<div style="width:${PW}px;margin-top:1px;text-align:center">
        <span style="font-family:Arial;font-size:6.8px;font-weight:800;color:${C.accent};letter-spacing:.3px">Roll No: ${escH(st.roll)}</span>
      </div>`:''}
    </td>

    <!-- RIGHT: all info perfectly aligned -->
    <td style="vertical-align:top;padding:7px 7px 6px 5px">
      <table cellspacing="0" cellpadding="0" style="border-collapse:collapse;width:100%">
        ${row("Class",          st.class)}
        ${row("Section",        st.section)}
        ${row("Father's Name",  st.father_name)}
        ${row("Mother's Name",  st.mother_name)}
        ${row("Date of Birth",  st.dob)}
        ${row("Blood Group",    st.blood_group)}
        ${row("Mobile No.",     st.mobile)}
        ${row("Address",        st.address, true)}
      </table>
    </td>

  </tr>

  <!-- ══ GOLD LINE ══ -->
  <tr><td colspan="2" style="height:3.5px;background:${C.accent};padding:0;font-size:0;line-height:0"></td></tr>

  <!-- ══ FOOTER ══ -->
  <tr><td colspan="2" style="background:${C.hdr};padding:0">
    <table cellspacing="0" cellpadding="0" style="width:100%;border-collapse:collapse"><tr>
      <td style="padding:5px 0 5px 9px;vertical-align:middle">
        <div style="font-family:Arial;font-size:7px;font-weight:800;color:${C.accent};letter-spacing:.5px">SESSION-${escH(sc.session||'2024-25')}</div>
      </td>
      <td style="padding:5px 9px 5px 0;text-align:right;vertical-align:bottom">
        ${sigEl(imgs.sig,56,20)}
        <div style="font-family:Arial;font-size:7px;font-weight:800;color:${C.accent};margin-top:1px">PRINCIPAL</div>
      </td>
    </tr></table>
  </td></tr>

</table>`;
}


// ── 3 PROFESSIONAL TEMPLATES ────────────────────────────────────────
// Research-backed: deep solid header + thin gold accent line + white body
// is the most widely used professional school ID card format globally.
// No colored strips on content areas — only clean typography.

function T1(st,sc,imgs){return buildCard(st,sc,{

},imgs)}

function T2(st,sc,imgs){return buildCard(st,sc,{

},imgs)}

function T3(st,sc,imgs){return buildCard(st,sc,{

const TMPLS=[
  {id:1,name:'Oxford Navy & Gold',  color:'#162A4A',desc:'Classic — prestigious'},
  {id:2,name:'Forest Green & Gold', color:'#0D3B2E',desc:'Academic — traditional'},

];

function renderCard(st,sc,imgs){

// ════════════════════════════════════════════════
// CROP MODAL
// ════════════════════════════════════════════════
let CROP={
  imgSrc:'',scale:1,x:0,y:0,
  dragging:false,startMx:0,startMy:0,startX:0,startY:0,
  aspect:null,stageW:360,stageH:360,
  callback:null
};
function openCrop(imgSrc,aspect,callback){
  CROP.imgSrc=imgSrc;CROP.aspect=aspect;CROP.callback=callback;
  CROP.scale=1;CROP.x=0;CROP.y=0;
  const el=document.getElementById('crop-modal');
  el.style.display='flex';
  const img=document.getElementById('crop-img');
  img.src=imgSrc;
  img.onload=()=>{
    // Auto-fit image to fill stage
    const sw=CROP.stageW,sh=CROP.stageH;
    const ratio=Math.max(sw/img.naturalWidth,sh/img.naturalHeight);
    CROP.scale=ratio;
    CROP.x=(sw-img.naturalWidth*ratio)/2;
    CROP.y=(sh-img.naturalHeight*ratio)/2;
    applyCropTransform();
    document.getElementById('crop-zoom').value=ratio;
    document.getElementById('crop-zoom').min=ratio*0.5;
    document.getElementById('crop-zoom').max=ratio*4;
    document.getElementById('crop-zoom').step=ratio*0.01;
  };
  // Draw overlay (darkened corners)
  const ov=document.getElementById('crop-overlay');
  if(aspect){
    const ch=aspect<1?CROP.stageW/aspect:CROP.stageW;
    const cw=CROP.stageW;
    const cy=(CROP.stageH-ch)/2;
    ov.innerHTML=`
      <div style="position:absolute;inset:0;background:rgba(0,0,0,.45);pointer-events:none">
        <div style="position:absolute;left:0;right:0;top:${cy}px;height:${ch}px;background:transparent;box-shadow:0 0 0 9999px rgba(0,0,0,.45)"></div>
      </div>
      <div style="position:absolute;left:0;right:0;top:${cy}px;height:${ch}px;border:2px solid #4F46E5;pointer-events:none;box-shadow:0 0 0 1px rgba(255,255,255,.3)"></div>`;
  } else {
    ov.innerHTML=`<div style="position:absolute;inset:0;border:2px solid #4F46E5;pointer-events:none"></div>`;
  }
}
function applyCropTransform(){
  const img=document.getElementById('crop-img');
  img.style.transform=`translate(${CROP.x}px,${CROP.y}px) scale(${CROP.scale})`;
  img.style.transformOrigin='0 0';
}
function cancelCrop(){document.getElementById('crop-modal').style.display='none'}
function confirmCrop(){
  const img=document.getElementById('crop-img');
  const canvas=document.createElement('canvas');
  const sw=CROP.stageW,sh=CROP.aspect?sw/CROP.aspect:CROP.stageH;
  const sy=(CROP.stageH-sh)/2;
  canvas.width=sw*3;canvas.height=sh*3;
  const ctx=canvas.getContext('2d');
  ctx.save();
  ctx.scale(3,3);
  ctx.translate(-0,-sy);
  ctx.translate(CROP.x,CROP.y);
  ctx.scale(CROP.scale,CROP.scale);
  ctx.drawImage(img,0,0);
  ctx.restore();
  const result=canvas.toDataURL('image/jpeg',0.95);
  document.getElementById('crop-modal').style.display='none';
  if(CROP.callback)CROP.callback(result);
}
// Drag events
document.addEventListener('DOMContentLoaded',()=>{
  const stage=document.getElementById('crop-stage');
  stage.addEventListener('mousedown',e=>{CROP.dragging=true;CROP.startMx=e.clientX;CROP.startMy=e.clientY;CROP.startX=CROP.x;CROP.startY=CROP.y;e.preventDefault()});
  stage.addEventListener('touchstart',e=>{const t=e.touches[0];CROP.dragging=true;CROP.startMx=t.clientX;CROP.startMy=t.clientY;CROP.startX=CROP.x;CROP.startY=CROP.y},{passive:true});
  document.addEventListener('mousemove',e=>{if(!CROP.dragging)return;CROP.x=CROP.startX+(e.clientX-CROP.startMx);CROP.y=CROP.startY+(e.clientY-CROP.startMy);applyCropTransform()});
  document.addEventListener('touchmove',e=>{if(!CROP.dragging)return;const t=e.touches[0];CROP.x=CROP.startX+(t.clientX-CROP.startMx);CROP.y=CROP.startY+(t.clientY-CROP.startMy);applyCropTransform()},{passive:true});
  document.addEventListener('mouseup',()=>{CROP.dragging=false});
  document.addEventListener('touchend',()=>{CROP.dragging=false});
  document.getElementById('crop-zoom').addEventListener('input',e=>{
    const newScale=parseFloat(e.target.value);
    const img=document.getElementById('crop-img');
    const cx=CROP.stageW/2,cy=CROP.stageH/2;
    CROP.x=cx-(cx-CROP.x)*newScale/CROP.scale;
    CROP.y=cy-(cy-CROP.y)*newScale/CROP.scale;
    CROP.scale=newScale;
    applyCropTransform();
  });
});

// ════════════════════════════════════════════════
// PDF GENERATION — v13 FINAL
//
// DIMENSION FIX: cards are placed at EXACTLY 50mm × 81mm (240:389 ratio)
// Physical size = ~5cm × 8.1cm, matches standard school ID card.
// Grid is auto-centered on the page — no cropping ever.
//
// LOGO FIX: imgToB64() waterfall converts ALL images to base64
// BEFORE html2canvas runs, so cross-origin is never an issue.
// ════════════════════════════════════════════════
async function generatePDF(){
  if(S.pdfBusy) return;
  const sid = S.pdfSid || S.schools[0]?.id;
  const sc  = S.schools.find(s => s.id === sid);
  if(!sc){ showMsg('Select a school','error'); return; }
  go({pdfBusy:true, pdfProg:0, pdfTotal:0});

  try{
    let students = await dbStudents(sid, S.pdfClass||null, S.pdfSection||null);
    if(!students.length){ go({pdfBusy:false}); showMsg('No students found','error'); return; }
    students.sort((a,b)=>{
      const p = n => isNaN(n) ? String(n) : String(n).padStart(4,'0');
      return (p(a.class)||'').localeCompare(p(b.class)||'')
          || (a.section||'').localeCompare(b.section||'')
          || (a.name||'').localeCompare(b.name||'');
    });

    // ── STEP 1: Load school logo + sig ──────────────────────────────
    go({pdfBusy:true, pdfProg:0, pdfTotal:students.length});
    showMsg('Loading logo & signature…', 'info');
    const logoB64 = await imgToB64(sc.logo_url);
    const sigB64  = await imgToB64(sc.sig_url);
    if(!logoB64) showMsg('⚠ Logo not found — check browser console (F12)', 'error');

    const {jsPDF} = window.jspdf;

    // ── FIXED CARD SIZE: exactly 50mm × 81mm (= 240:389 ratio) ─────
    // Physical: ~5cm × 8.1cm — standard school ID card.
    // Layout grid — all declared with var to avoid temporal dead zone entirely
    var L       = S.pdfLayout || 10;
    var COLS    = L===1?1 : L===2?2 : L===4?2 : L===8?4 : 5;
    var ROWS_PP = L===1?1 : L===2?2 : 2;
    var orient  = (L===1||L===2) ? 'portrait' : 'landscape';
    var GAP     = COLS>=5 ? 3 : 4;
    var CARD_W  = 50;
    var CARD_H  = 81;

    // Check fit — if cards exceed page, drop to fewer rows
    const A4W = orient==='landscape' ? 297 : 210;
    const A4H = orient==='landscape' ? 210 : 297;
    const neededW = COLS * CARD_W + (COLS-1) * GAP;
    const neededH = ROWS_PP * CARD_H + (ROWS_PP-1) * GAP;
    // If doesn't fit, reduce rows to 1 (prevents any cropping)
    const finalRows = neededH <= A4H - 10 ? ROWS_PP : 1;
    const PP = COLS * finalRows;

    // Center grid on page
    const gridW = COLS * CARD_W + (COLS-1) * GAP;
    const gridH = finalRows * CARD_H + (finalRows-1) * GAP;
    const startX = (A4W - gridW) / 2;
    const startY = (A4H - gridH) / 2;

    // Build position grid
    const pos = [];
    for(let r=0; r<finalRows; r++)
      for(let cc=0; cc<COLS; cc++)
        pos.push({ x: startX + cc*(CARD_W+GAP), y: startY + r*(CARD_H+GAP) });

    const pdf = new jsPDF({ orientation: orient, unit: 'mm', format: 'a4' });

    // ── Render zone ─────────────────────────────────────────────────
    const zone = document.getElementById('rzone');
    zone.style.cssText = 'position:absolute;top:300vh;left:0;width:260px;background:#fff;z-index:-1;pointer-events:none';

    const SCALE = 6; // Renders at 240px×6=1440px wide → ~290 DPI at 50mm print size

    const h2cOpts = {
      scale: SCALE,
      useCORS: true,
      allowTaint: false,  // false = safer when using base64 data URIs
      logging: false,
      backgroundColor: '#ffffff',
      scrollX: 0,
      scrollY: -window.scrollY,
      imageTimeout: 30000,
    };

    // ── STEP 2: Render each student card ────────────────────────────
    for(let i=0; i<students.length; i++){
      const pi = i % PP;
      if(pi === 0 && i > 0) pdf.addPage();

      // Convert student photo to base64
      const photoB64 = await imgToB64(students[i].photo_url);
      const imgs = { logo: logoB64, photo: photoB64, sig: sigB64 };

      // Render card HTML into rzone, wait for DOM paint
      zone.innerHTML = renderCard(students[i], sc, imgs);
      await new Promise(r => setTimeout(r, 60));

      const el = zone.querySelector('table');
      if(!el) continue;

      const cv = await html2canvas(el, h2cOpts);

      const {x, y} = pos[pi];
      // Place at FIXED 50×81mm — exact physical dimensions
      pdf.addImage(cv.toDataURL('image/png'), 'PNG', x, y, CARD_W, CARD_H, `c${i}`, 'FAST');

      // Dashed cut guide
      pdf.setDrawColor(160, 160, 160);
      pdf.setLineDash([0.5, 0.8]);
      pdf.setLineWidth(0.06);
      pdf.rect(x, y, CARD_W, CARD_H);
      pdf.setLineDash([]);

      go({pdfBusy:true, pdfProg:i+1, pdfTotal:students.length});
      await new Promise(r => setTimeout(r, 0));
    }

    zone.innerHTML = '';
    go({pdfBusy: false});
    pdf.save(`${(sc.name||'School').replace(/[^a-zA-Z0-9]/g,'_')}_ID_Cards.pdf`);
    showMsg(`✓ PDF saved — ${students.length} cards at 5cm×8.1cm`, 'success');

  } catch(e){
    console.error('PDF error:', e);
    go({pdfBusy: false});
    showMsg('PDF error: ' + e.message, 'error');
  }
}

async function importExcel(file,schoolId){
  try{
    const ab=await file.arrayBuffer();
    const wb=XLSX.read(ab,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
    if(!rows.length){showMsg('No data found','error');return}
    // Normalize all keys to lowercase-underscore for robust matching
    const norm=(r,keys)=>{
      for(const k of keys){if(r[k]!==undefined&&r[k]!=='')return String(r[k]).trim();}
      // Also try normalized version of all keys
      for(const [rk,rv] of Object.entries(r)){
        const nk=rk.toLowerCase().replace(/[^a-z0-9]/g,'_');
        if(keys.map(k=>k.toLowerCase().replace(/[^a-z0-9]/g,'_')).includes(nk)&&rv!=='')return String(rv).trim();
      }
      return '';
    };
    const batch=rows.map(r=>({
      school_id:schoolId,
      name:norm(r,['Name','name','Student Name','STUDENT NAME']),
      roll:norm(r,['Roll No','Roll No.','Roll','roll','Roll Number','ROLL NO']),
      father_name:norm(r,["Father Name","Father's Name","Father","FATHER NAME","father_name","Father_Name","FatherName"]),
      mother_name:norm(r,["Mother Name","Mother's Name","Mother","MOTHER NAME","mother_name","Mother_Name","MotherName"]),
      dob:norm(r,['DOB','Date of Birth','D.O.B','dob','DateOfBirth','Birth Date']),
      blood_group:norm(r,['Blood Group','Blood','blood_group','BloodGroup','Blood Type']),
      class:norm(r,['Class','class','CLASS','Grade','grade']),
      section:norm(r,['Section','section','SECTION','Sec','sec']),
      mobile:norm(r,['Mobile','Mobile No','Mobile No.','mobile','Phone','Phone No','Contact']),
      address:String(r['Address']||r['address']||'').trim(),
    })).filter(r=>r.name);
    await dbBulkStudents(batch);
    delete S.stuCache[schoolId];
    await loadStu(schoolId,true);
    showMsg(`✓ ${batch.length} students imported`,'success');
  }catch(e){showMsg('Import error: '+e.message,'error')}
}

function copyLink(sid){
  const u=location.href.split('?')[0]+'?school='+sid;

}

  const st=(S.stuCache[sid]||[]).find(s=>s.id===stId);

  if(!st||!sc)return;
  const[logoB64,photoB64,sigB64]=await Promise.all([imgToB64(sc.logo_url),imgToB64(st.photo_url),imgToB64(sc.sig_url)]);
  openM('preview',null,{st,sc,imgs:{logo:logoB64,photo:photoB64,sig:sigB64}});
}
function editStu(stId,sid){const st=(S.stuCache[sid]||[]).find(s=>s.id===stId);if(st)openM('student-edit',null,{st,sid})}

}

function assetCrop(inp,b64Id,imgId,prevId,lblId,aspect){
  if(!inp.files?.[0])return;
  const r=new FileReader();
  r.onload=e=>{
    openCrop(e.target.result,aspect,(cropped)=>{
      document.getElementById(b64Id).value=cropped;
      const img=document.getElementById(imgId);if(img){img.src=cropped;document.getElementById(prevId).style.display='block';}
      document.getElementById(lblId).textContent='✓ '+(b64Id.includes('logo')?'Logo ready':'Signature ready');
    });
  };r.readAsDataURL(inp.files[0]);inp.value='';
}

function pickTmpl(id){
  document.getElementById('tmpl-v').value=id;
  TMPLS.forEach(T=>{const el=document.getElementById('to-'+T.id);if(el)el.style.borderColor=T.id===id?T.color:'#E2E8F0';});
}

async function b64ToFile(b64,name){
  if(!b64||b64.startsWith('http'))return null;
  const res=await fetch(b64);const blob=await res.blob();
  return new File([blob],name,{type:blob.type||'image/jpeg'});
}

async function saveSchool(e,existingId){
  e.preventDefault();
  const btn=document.getElementById('sc-btn');btn.disabled=true;btn.textContent='Saving…';
  const fd=new FormData(e.target);
  const sc={name:fd.get('name'),address:fd.get('address'),phone:fd.get('phone'),
    website:fd.get('website'),affiliation:fd.get('affiliation'),session:fd.get('session'),
    managed_by:fd.get('managed_by'),template:parseInt(fd.get('template'))||1};
  if(existingId)sc.id=existingId;
  const existing=existingId?S.schools.find(s=>s.id===existingId):null;
  try{
    // logo
    const logob64=document.getElementById('logo-b64').value;
    if(logob64&&!logob64.startsWith('http')){
      const f=await b64ToFile(logob64,`logo_${gid()}.jpg`);
      if(f)sc.logo_url=await uploadFile('assets',f.name,f);
    } else sc.logo_url=existing?.logo_url||null;
    // sig
    const sigb64=document.getElementById('sig-b64').value;
    if(sigb64&&!sigb64.startsWith('http')){
      const f=await b64ToFile(sigb64,`sig_${gid()}.jpg`);
      if(f)sc.sig_url=await uploadFile('assets',f.name,f);
    } else sc.sig_url=existing?.sig_url||null;

    await dbSaveSchool(sc);
    const schools=await dbSchools();
    closeM();go({schools});showMsg(`✓ School ${existingId?'updated':'added'}`,'success');
  }catch(err){btn.disabled=false;btn.textContent=existingId?'Save Changes':'Add School';showMsg('Error: '+err.message,'error')}
}

async function setTemplate(sid,tid){
  try{await dbSaveSchool({id:sid,template:tid});const sc=await dbSchools();closeM();go({schools:sc});showMsg('✓ Template updated','success');}
  catch(e){showMsg('Error: '+e.message,'error')}
}

async function saveStu(e,schoolId,existingId){
  e.preventDefault();
  const btn=document.getElementById('stu-btn');btn.disabled=true;btn.textContent='Saving…';
  const fd=new FormData(e.target);
  let photo_url=null;
  const existing=existingId?(S.stuCache[schoolId]||[]).find(s=>s.id===existingId):null;
  try{
    const phob64=document.getElementById('stu-pho-b64').value;
    if(phob64&&!phob64.startsWith('http')){
      const f=await b64ToFile(phob64,`stu_${gid()}.jpg`);
      if(f)photo_url=await uploadFile('photos',f.name,f);
    } else photo_url=existing?.photo_url||null;

    const st={school_id:schoolId,name:fd.get('name').trim(),roll:fd.get('roll').trim(),
      class:fd.get('class').trim(),section:fd.get('section').trim(),
      father_name:fd.get('father_name').trim(),mother_name:fd.get('mother_name').trim(),
      dob:fd.get('dob').trim(),blood_group:fd.get('blood_group').trim(),
      mobile:fd.get('mobile').trim(),address:fd.get('address').trim(),photo_url};
    if(existingId)st.id=existingId;
    await dbSaveStudent(st);
    delete S.stuCache[schoolId];
    await loadStu(schoolId,true);
    closeM();showMsg(`✓ Student ${existingId?'updated':'added'}`,'success');
  }catch(err){btn.disabled=false;btn.textContent=existingId?'Save Changes':'Add Student';showMsg('Error: '+err.message,'error')}
}

function handleXL(inp,sid){if(!inp.files?.[0])return;closeM();importExcel(inp.files[0],sid)}

    if(schools.length){S.fSid=schools[0].id;S.pdfSid=schools[0].id}
    const params=new URLSearchParams(location.search);
    const sp=params.get('school');
    if(sp&&schools.find(s=>s.id===sp)){S.view='student-form';S.pubSid=sp;}
    document.getElementById('ls').style.display='none';
    document.getElementById('root').style.display='block';
    render();
  }catch(err){
    lsmsg.textContent='Connection failed: '+err.message;
    lsmsg.style.color='#EF4444';
    console.error(err);
  }
}
window.addEventListener('DOMContentLoaded',init);
</script>
</body>
